<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web PPT Viewer</title>
  </head>
  <body>
    <div class="app-shell">
      <aside class="app-panel">
        <div>
          <h1>Browser PPT Viewer</h1>
          <p>
            Loads a PPTX in the browser and, when available, uses PDF or JPEG previews for high-fidelity slide
            rendering.
          </p>
        </div>

        <button id="load-sample">Load local sample/ assets</button>

        <label>
          PPTX file
          <input id="pptx-input" type="file" accept=".ppt,.pptx,application/vnd.openxmlformats-officedocument.presentationml.presentation" />
        </label>

        <label>
          Optional PDF preview
          <input id="pdf-input" type="file" accept="application/pdf" />
        </label>

        <div id="status" class="status">Booting…</div>

        <ul>
          <li>PPTX만 있어도 기본 텍스트, 이미지, 도형 레이아웃을 렌더링합니다.</li>
          <li>PDF 또는 JPEG 미리보기가 있으면 원본에 가까운 슬라이드 이미지를 사용합니다.</li>
          <li>Keep sample/ local only; it is gitignored.</li>
        </ul>
      </aside>
      <main class="viewer-shell">
        <div id="viewer"></div>
      </main>
    </div>
    <script type="module" src="/src/demo.ts"></script>
  </body>
</html>
